apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloud-pizza

spec:
  replicas: 2

  selector:
    matchLabels:
      app: pizza

  template:
    metadata:
      labels:
        app: pizza

    spec:
      containers:
      - name: pizza

        image: cloud-pizza

        imagePullPolicy: Never

        ports:
        - containerPort: 5000